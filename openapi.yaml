  /api/v1/worlds/{world_id}/narrative:
    get:
      tags: [WebSocket]
      summary: 叙事 WebSocket 握手
      operationId: narrativeWebSocketHandshake
      description: |
        该接口会升级为 WebSocket 连接。

        握手要求：
        - 路径参数 `world_id`
        - 查询参数 `token`

        当前实现说明：
        - handler 内部校验 token 是否有效
        - 当前握手阶段未额外校验该 world 是否属于当前用户

        客户端主要发送消息：
        - `{"type":"turn_submit","data":{"character_id":1,"content":"..."}}`
        - `{"type":"ping"}`

        服务端主要推送消息：
        - `narrative_error`
        - `narrative_stream`
        - `narrative_complete`
        - `world_time_update`
        - `ripple_brief`
        - `background_event`
      parameters:
        - $ref: '#/components/parameters/WorldID'
        - name: token
          in: query
          required: true
          description: JWT，供 WebSocket 握手校验使用
          schema:
            type: string
      responses:
        '101':
          description: WebSocket 握手成功并切换协议
        '400':
          description: world_id 格式错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: token 缺失或无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WorldID:
      name: world_id
      in: path
      required: true
      description: 世界观 ID
      schema:
        type: integer
        minimum: 1
    CharID:
      name: char_id
      in: path
      required: true
      description: 角色 ID
      schema:
        type: integer
        minimum: 1
    CharacterID:
      name: character_id
      in: path
      required: true
      description: 角色 ID
      schema:
        type: integer
        minimum: 1
    RelID:
      name: rel_id
      in: path
      required: true
      description: 关系 ID
      schema:
        type: integer
        minimum: 1
    EntryID:
      name: entry_id
      in: path
      required: true
      description: 故事线条目 UUID
      schema:
        type: string
  schemas:
    SuccessResponse:
      type: object
      required: [code, message, data]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: 请求参数错误
    NullSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              type: object
              nullable: true
              example: null
    HealthData:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.1.0
    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/HealthData'
    RegisterReq:
      type: object
      required: [username, password, email]
      properties:
        username:
          type: string
          example: alice
        password:
          type: string
          minLength: 6
          example: pass123456
        email:
          type: string
          format: email
          example: alice@example.com
        birth_date:
          type: string
          description: 生日，格式 YYYY-MM-DD
          example: '2000-01-01'
    LoginReq:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: alice
        password:
          type: string
          example: pass123456
    AuthResp:
      type: object
      required: [user_id, token]
      properties:
        user_id:
          type: integer
          example: 1
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.xxx.yyy
    AuthResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthResp'
    MeData:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: integer
          example: 1
    MeResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MeData'
    Region:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: 北境
        description:
          type: string
          example: 常年冰雪覆盖的边境地带
        climate:
          type: string
          example: 寒冷
        notable_places:
          type: array
          items:
            type: string
    WorldSettings:
      type: object
      properties:
        description:
          type: string
        epoch:
          type: string
          example: 大陆历 1 年
        current_year:
          type: integer
          minimum: 0
          example: 1
        core_rules:
          type: array
          items:
            type: string
        themes:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        magic_system:
          type: string
          description: 预设示例 none/low/high/unique，也支持自定义
        tech_level:
          type: string
          description: 预设示例 stone_age/medieval/renaissance/industrial/modern/future/scifi，也支持自定义
        economy_type:
          type: string
          description: 预设示例 barter/currency/resource/post_scarcity，也支持自定义
        government:
          type: string
        religion:
          type: string
        regions:
          type: array
          items:
            $ref: '#/components/schemas/Region'
        factions:
          type: array
          items:
            type: string
        major_cities:
          type: array
          items:
            type: string
        races:
          type: array
          items:
            type: string
        nsfw_enabled:
          type: boolean
        evolution_enabled:
          type: boolean
        metadata:
          type: object
          additionalProperties: true
    World:
      type: object
      required: [id, user_id, name, slug, epoch, current_year, nsfw_enabled, evolution_enabled, created_at, updated_at]
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        name:
          type: string
          example: 艾泽拉斯大陆
        slug:
          type: string
          example: w1-ab12cd34
        description:
          type: string
        epoch:
          type: string
          example: 大陆历 1 年
        current_year:
          type: integer
          example: 1
        core_rules:
          type: array
          items:
            type: string
        themes:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        magic_system:
          type: string
        tech_level:
          type: string
        economy_type:
          type: string
        government:
          type: string
        religion:
          type: string
        regions:
          type: array
          items:
            $ref: '#/components/schemas/Region'
        factions:
          type: array
          items:
            type: string
        major_cities:
          type: array
          items:
            type: string
        races:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        active_timeline_id:
          type: integer
          nullable: true
          example: 2
        nsfw_enabled:
          type: boolean
        evolution_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CreateWorldReq:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: 艾泽拉斯大陆
        settings:
          $ref: '#/components/schemas/WorldSettings'
    UpdateWorldReq:
      type: object
      properties:
        name:
          type: string
          nullable: true
          example: 新纪元
        settings:
          allOf:
            - $ref: '#/components/schemas/WorldSettings'
          nullable: true
    CreateWorldData:
      type: object
      required: [world]
      properties:
        world:
          $ref: '#/components/schemas/World'
    CreateWorldResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/CreateWorldData'
    ListWorldsData:
      type: object
      required: [worlds, total, page, limit]
      properties:
        worlds:
          type: array
          items:
            $ref: '#/components/schemas/World'
        total:
          type: integer
          format: int64
          example: 2
        page:
          type: integer
          description: 当前实现未传 page 时可能回显 0
          example: 0
        limit:
          type: integer
          description: 当前实现未传 limit 时可能回显 0
          example: 0
    ListWorldsResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ListWorldsData'
    WorldResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/World'
    AdvanceTimeReq:
      type: object
      required: [years]
      properties:
        years:
          type: integer
          minimum: 1
          example: 1
    WorldTimeUpdate:
      type: object
      required: [world_id, new_epoch, new_year, years_advanced, aged_char_count, stage_change_count, event_count]
      properties:
        world_id:
          type: integer
          example: 1
        new_epoch:
          type: string
          example: 大陆历2年
        new_year:
          type: integer
          example: 2
        years_advanced:
          type: integer
          example: 1
        aged_char_count:
          type: integer
          example: 3
        death_names:
          type: array
          items:
            type: string
        stage_change_count:
          type: integer
          example: 1
        event_count:
          type: integer
          example: 2
    WorldTimeUpdateResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/WorldTimeUpdate'
    CreateBranchReq:
      type: object
      required: [parent_timeline_id, choice_desc]
      properties:
        parent_timeline_id:
          type: integer
          minimum: 1
          description: 当前实现绑定 required，HTTP 层实际要求该值存在且非 0
          example: 1
        choice_desc:
          type: string
          example: 选择调查古老遗迹
    StoryBranch:
      type: object
      required: [id, world_id, choice_desc, created_at, updated_at]
      properties:
        id:
          type: integer
          example: 1
        world_id:
          type: integer
          example: 1
        parent_id:
          type: integer
          nullable: true
          example: 1
        choice_desc:
          type: string
          example: 选择调查古老遗迹
        snapshot_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    StoryBranchResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/StoryBranch'
    BranchNode:
      allOf:
        - $ref: '#/components/schemas/StoryBranch'
        - type: object
          required: [children]
          properties:
            children:
              type: array
              items:
                $ref: '#/components/schemas/BranchNode'
    BranchTree:
      type: object
      required: [roots]
      properties:
        roots:
          type: array
          items:
            $ref: '#/components/schemas/BranchNode'
    BranchTreeResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/BranchTree'
    SwitchBranchReq:
      type: object
      required: [timeline_id]
      properties:
        timeline_id:
