          type: string
          description: 故事发生位置
          example: 暴风城
        summary:
          type: string
          description: 事件摘要描述
          example: 参加了王位继承会议
        tags:
          type: array
          description: 标签列表
          items:
            type: string
          example: [政治, 王位]
        emotion_tag:
          type: string
          description: 情绪标签
          example: 喜悦
        is_core_memory:
          type: boolean
          description: 是否为核心记忆（固定，不被压缩）
          default: false
        related_character_ids:
          type: array
          description: 相关角色 ID 列表
          items:
            type: integer
          example: [2, 3]
        created_at:
          type: string
          format: date-time
      required: [id, timestamp, summary, is_core_memory, created_at]

    PinEntryReq:
      type: object
      required: [is_core_memory]
      properties:
        is_core_memory:
          type: boolean
          description: true 固定为核心记忆，false 取消固定
          example: true

    # ===========================================================
    # WebSocket 消息格式
    # ===========================================================
    WSClientMessage:
      type: object
      description: 客户端发送给服务端的 WebSocket 消息
      required: [type, data]
      properties:
        type:
          type: string
          enum: [turn_submit]
          description: 消息类型
          example: turn_submit
        data:
          type: object
          required: [character_id, content]
          properties:
            character_id:
              type: integer
              description: 要操控的角色 ID
              example: 1
            content:
              type: string
              description: 用户输入的叙事指令
              example: 向北方前进，探索未知的遗迹

    WSServerMessage:
      type: object
      description: 服务端推送给客户端的 WebSocket 消息
      properties:
        type:
          type: string
          enum: [narrative_stream, narrative_complete, narrative_error, world_time_update, background_event]
          description: 服务端推送消息类型
          example: narrative_stream
        content:
          type: string
          description: 消息内容（narrative_stream / narrative_complete / narrative_error 时携带）
        entry_id:
          type: string
          format: uuid
          description: 故事线条目 ID（narrative_complete 时携带）
        data:
          type: object
          description: 附加数据（world_time_update / background_event 时携带）
