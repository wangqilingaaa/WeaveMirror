openapi: 3.0.3
info:
  title: WeaveMirrorServer API
  version: 2026-05-07
  description: |
    基于当前代码实现重新生成的 OpenAPI 文档。

    审计口径：
    - 路由以 route 包实际注册结果为准
    - 请求体与响应体以 handler / service / model 的真实绑定与返回结构为准
    - 若历史文档、注释或旧测试与本文档冲突，以当前实现为准

    统一约定：
    - HTTP 成功响应：`{code: 0, message: "success", data: ...}`
    - HTTP 失败响应：`{code: HTTP状态码, message: "错误信息"}`
    - 受保护接口使用 `Authorization: Bearer <token>`
    - WebSocket 握手地址：`/api/v1/worlds/{world_id}/narrative?token=<jwt>`
servers:
  - url: http://localhost:8080
    description: 本地开发环境
tags:
  - name: 系统
  - name: 认证
  - name: 用户
  - name: 世界观
  - name: 角色
  - name: 关系网
  - name: 故事线
  - name: WebSocket
paths:
  /health:
    get:
      tags: [系统]
      summary: 健康检查
      operationId: healthCheck
      responses:
        '200':
          description: 服务健康状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/auth/register:
    post:
      tags: [认证]
      summary: 用户注册
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterReq'
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: 请求体格式错误或参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 用户名已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      tags: [认证]
      summary: 用户登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginReq'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: 请求体格式错误或参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 用户名或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/me:
    get:
      tags: [用户]
      summary: 获取当前用户上下文
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 返回当前用户 ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/worlds:
    get:
      tags: [世界观]
      summary: 获取世界观列表
      operationId: listWorlds
      description: |
        分页获取当前用户的世界观列表。

        注意：
        - service 层查询默认值为 `page=1, limit=10`
        - 若请求未显式传 `page`、`limit`，当前实现返回体中的 `page`、`limit` 可能回显 `0`
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: 页码。未传时 service 会按 1 查询，但响应体可能回显 0。
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          description: 每页数量。未传时 service 会按 10 查询，最大 100。
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: 世界观列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListWorldsResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [世界观]
      summary: 创建世界观
      operationId: createWorld
      description: |
        创建新世界观。

        服务端默认值：
        - `epoch = "大陆历 1 年"`
        - `current_year = 1`
        - `nsfw_enabled = false`
        - `evolution_enabled = true`

        重要实现细节：
        - 若传入了 `settings` 对象，字段会被扁平化写入世界模型
        - `settings.evolution_enabled` 在请求中未显式传值但 `settings` 存在时，当前实现可能因 Go 零值而覆盖默认值
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorldReq'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWorldResponse'
        '400':
          description: 请求体错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/worlds/{world_id}:
    get:
      tags: [世界观]
      summary: 获取世界观详情
      operationId: getWorld
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
      responses:
        '200':
          description: 世界观详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorldResponse'
        '400':
          description: world_id 格式错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权访问该世界观
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 世界观不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [世界观]
      summary: 更新世界观
      operationId: updateWorld
      description: |
        更新世界观名称或设定。

        注意：
        - `name` 只有在非空字符串时才会生效
        - `settings` 不是安全的局部 patch，大部分字段会直接覆盖旧值
        - 仅 `epoch != ""` 和 `current_year > 0` 时才会覆盖对应字段
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorldReq'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorldResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权修改该世界观
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/worlds/{world_id}/time/advance:
    post:
      tags: [世界观]
      summary: 推进世界时间
      operationId: advanceTime
      description: |
        推进世界年份，并触发：
        - 世界年份与纪元更新
        - 所有非死亡角色老化
        - 阶段变化与死亡事件生成
        - 对当前用户单播 `world_time_update` WebSocket 消息
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvanceTimeReq'
      responses:
        '200':
          description: 时间推进结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorldTimeUpdateResponse'
        '400':
          description: world_id 或 years 非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权推进该世界观时间
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/worlds/{world_id}/timeline/branch:
    post:
      tags: [世界观]
      summary: 创建时间线分支
      operationId: createBranch
      description: |
        创建新的时间线分支。

        注意：
        - 当前请求字段名为 `parent_timeline_id`
        - service 层支持 `0` 表示主干
        - 但 handler 使用 `binding:"required"`，HTTP 层当前实际上要求该字段存在且非 0
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBranchReq'
      responses:
        '200':
          description: 分支创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoryBranchResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/worlds/{world_id}/timelines:
    get:
      tags: [世界观]
      summary: 获取时间线分支树
      operationId: getBranchTree
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
      responses:
        '200':
          description: 分支树
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchTreeResponse'
        '400':
          description: world_id 非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/worlds/{world_id}/active-timeline:
    put:
      tags: [世界观]
      summary: 切换当前活跃时间线
      operationId: switchActiveBranch
      description: |
        请求字段名为 `timeline_id`。
        成功时当前实现返回 `data: null`，不会回显 `active_timeline_id`。
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwitchBranchReq'
      responses:
        '200':
          description: 切换成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullSuccessResponse'
        '400':
          description: world_id 或 timeline_id 非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 分支不存在或服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/worlds/{world_id}/yearbook:
    get:
      tags: [世界观]
      summary: 获取世界年鉴
      operationId: getYearbook
      description: |
        返回当前世界的年鉴事件数组。

        注意：
        - 当前实现不支持分页
        - service 内部最多读取前 500 条记录
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
      responses:
        '200':
          description: 年鉴事件列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YearbookResponse'
        '400':
          description: world_id 非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/ai/enhance-world-settings:
    post:
      tags: [世界观]
      summary: AI 优化世界观设定
      operationId: aiEnhanceWorldSettings
      description: 该接口不会写数据库，只返回 AI 优化建议。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIEnhanceSettingsReq'
      responses:
        '200':
          description: AI 优化结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIEnhanceSettingsResponse'
        '400':
          description: 请求体错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: AI 服务错误或配置缺失
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/worlds/{world_id}/characters:
    get:
      tags: [角色]
      summary: 获取角色列表
      operationId: listCharacters
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
        - name: state
          in: query
          description: 按角色状态筛选
          schema:
            type: string
        - name: life_stage
          in: query
          description: 按生命阶段筛选
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: 角色列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterListResponse'
        '400':
          description: world_id 非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权查看该世界下的角色
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [角色]
      summary: 创建角色
      operationId: createCharacter
      description: |
        在指定世界观下创建角色。

        服务端默认值：
        - `state = "活跃"`
        - `species = "人类"`（未传时）
        - `nsfw_level = "sfw"`（未传时）
        - `base_attributes` 六维默认均为 `50`（未传时）
        - `life_stage` 未传时按 `age` 自动计算

        注意：
        - 仅 `name` 为业务必填
        - `age` 为普通 `int`，未传时当前实现会按 `0` 处理
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCharacterReq'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterResponse'
        '400':
          description: 请求体错误或业务校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权在该世界创建角色
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/worlds/{world_id}/characters/{char_id}:
    get:
      tags: [角色]
      summary: 获取角色详情
      operationId: getCharacter
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
        - $ref: '#/components/parameters/CharID'
      responses:
        '200':
          description: 角色详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterResponse'
        '400':
          description: world_id 或 char_id 非法
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权访问该角色
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 角色不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [角色]
      summary: 更新角色
      operationId: updateCharacter
      description: |
        所有字段均可选，仅更新传入字段。

        注意：
        - 当前实现不支持修改 `name`
        - 若更新了 `age`，服务端会重新计算并覆盖 `life_stage`
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
        - $ref: '#/components/parameters/CharID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCharacterReq'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterResponse'
        '400':
          description: 请求体错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权修改该角色
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 角色不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [角色]
      summary: 删除角色
      operationId: deleteCharacter
      description: 当前实现只允许删除状态为 `死亡` 的角色。
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
        - $ref: '#/components/parameters/CharID'
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: world_id / char_id 非法或角色状态不允许删除
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未认证或 token 无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 无权删除该角色
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/worlds/{world_id}/characters/{char_id}/state:
    put:
      tags: [角色]
      summary: 修改角色状态
      operationId: changeCharacterState
      description: |
        常规状态流转：
        - 活跃 -> 休眠 / 潜伏
        - 休眠 -> 活跃 / 潜伏
        - 潜伏 -> 活跃 / 休眠

        特殊规则：
        - 将角色设为 `死亡` 时必须 `force=true`
        - 设为死亡后，当前实现会把 `death_epoch` 固定写为 `大陆历 1 年`
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorldID'
