                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [关系网]
      summary: 创建关系
      operationId: createRelationship
      description: |
        创建两名角色之间的有向关系。

        注意：
        - `source_id` 与 `target_id` 不能相同
        - `strength` 会被截断到 `[-100, 100]`
        - `metadata` 为空时会被替换为 `{}` 字符串
